<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard PMO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/shared.css">

  <style>
    /* HOME — estilos específicos de esta página */

    body {
      display: flex;
      flex-direction: column;
    }

    main {
      max-width: 860px;
      width: 100%;
      margin: auto;
      padding: 40px 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 56px;
    }

    .hero-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }

    .hero-sub {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* GRID DE TARJETAS */
    .sections-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow);
    }

    .section-card:hover {
      border-color: var(--accent);
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08);
    }

    .icon-box {
      width: 48px;
      height: 48px;
      background: var(--accent-light);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .section-desc {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .card-footer {
      margin-top: auto;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (max-width: 640px) {
      .sections-grid { grid-template-columns: 1fr; }
      main { padding: 40px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">
      <img src="assets/img/logo-xcale.png" alt="X CALE Tech" class="nav-logo-img">
    </div>
    <span class="nav-section">PMO Dashboard</span>
  </nav>

  <main>
    <header class="hero">
      <h1 class="hero-title">Dashboard PMO</h1>
    </header>

    <div class="sections-grid">
      <a href="crs/index.html" class="section-card">
        <div class="icon-box">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"></path><path d="M8 21H3v-5"></path><path d="M21 3 3 21"></path></svg>
        </div>
        <h2 class="section-title">Change Requests</h2>
        <p class="section-desc">Control de desviaciones y estimaciones por rol.</p>
        <div class="card-footer">Ver reportes <span>→</span></div>
      </a>

      <a href="mensual/index.html" class="section-card">
        <div class="icon-box">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        </div>
        <h2 class="section-title">Métricas Mensuales</h2>
        <p class="section-desc">Análisis de esfuerzo mensual y métricas de Service Desk.</p>
        <div class="card-footer">Ver reportes <span>→</span></div>
      </a>
    </div>
  </main>

</body>
</html>
