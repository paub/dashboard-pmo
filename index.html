<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard PMO</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --accent: #2563eb;
      --border: rgba(0, 0, 0, 0.06);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --radius: 16px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
    }

    .nav-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    main {
      max-width: 900px;
      width: 100%;
      margin: auto;
      padding: 40px 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .hero-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .hero-sub {
      color: var(--text-secondary);
      font-size: 16px;
    }

    .sections-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .section-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* Estilo de los iconos nuevos */
    .icon-box {
      width: 40px;
      height: 40px;
      background: #eff6ff; /* Azul muy clarito */
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-desc {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    @media (max-width: 640px) {
      .sections-grid { grid-template-columns: 1fr; }
      .hero-title { font-size: 26px; }
    }
  </style>
</head>

<body>
  <nav><span class="nav-logo">PMO Dashboard</span></nav>

  <main>
    <header class="hero">
      <h1 class="hero-title">Gestión de Proyectos</h1>
      <p class="hero-sub">Seleccione un área para explorar los reportes detallados.</p>
    </header>

    <div class="sections-grid">
      <!-- Card 1 -->
      <a href="reportes/mensual/index.html" class="section-card">
        <div class="card-header">
          <div class="icon-box">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          </div>
          <h2 class="section-title">Métricas Mensuales</h2>
        </div>
        <p class="section-desc">Seguimiento de esfuerzo, performance y métricas clave de Service Desk.</p>
      </a>

      <!-- Card 2 -->
      <a href="crs/index.html" class="section-card">
        <div class="card-header">
          <div class="icon-box">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"></path><path d="M8 21H3v-5"></path><path d="M21 3 3 21"></path></svg>
          </div>
          <h2 class="section-title">Change Requests</h2>
        </div>
        <p class="section-desc">Análisis de desvíos, breakdown por rol y comparativa de ejecución real.</p>
      </a>
    </div>
  </main>
</body>
</html>
