<style>
  /* ... manteniendo tus variables anteriores ... */
  
  main {
    max-width: 800px; /* Reducimos el ancho para que las 2 cards no se alejen tanto */
    width: 100%;
    margin: auto;
    padding: 80px 24px; /* Más aire arriba para centrar la vista */
    display: flex;
    flex-direction: column;
    align-items: center; /* Centra todo el contenido */
  }

  .hero {
    text-align: center;
    margin-bottom: 60px;
  }

  .sections-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    width: 100%; /* Que ocupe el ancho del main */
  }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; /* Bordes más suaves para un look moderno */
    padding: 40px 32px; /* Más padding interno para que se vea premium */
    text-decoration: none;
    color: inherit;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  }

  .section-card:hover {
    border-color: var(--accent);
    transform: translateY(-8px); /* Salto más pronunciado */
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
  }

  .card-header {
    display: flex;
    flex-direction: column; /* Icono arriba del título para llenar más espacio vertical */
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 16px;
  }

  .icon-box {
    width: 48px;
    height: 48px;
    background: #f0f4ff;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
  }

  .section-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .section-desc {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }

  /* El detalle que "cierra" el diseño: */
  .card-footer {
    margin-top: auto;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 4px;
  }
</style>

<main>
  <header class="hero">
    <h1 class="hero-title">Gestión de Proyectos</h1>
    <p class="hero-sub">Dashboard central de métricas y control operativo.</p>
  </header>

  <div class="sections-grid">
    <a href="#" class="section-card">
      <div class="card-header">
        <div class="icon-box">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </div>
        <h2 class="section-title">Métricas Mensuales</h2>
      </div>
      <p class="section-desc">Performance operativa y niveles de servicio del Service Desk.</p>
      <div class="card-footer">Ver reporte <span>→</span></div>
    </a>

    <a href="#" class="section-card">
      <div class="card-header">
        <div class="icon-box">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m21 3-9 9m9-9h-9m9 0v9M3 21l9-9m-9 9h9m-9 0v-9"/></svg>
        </div>
        <h2 class="section-title">Change Requests</h2>
      </div>
      <p class="section-desc">Control de desviaciones y estimaciones por rol en cambios.</p>
      <div class="card-footer">Ver reporte <span>→</span></div>
    </a>
  </div>
</main>
