<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard PMO</title>
  <style>
    /* 1. RESET Y VARIABLES GLOBALES */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --accent: #264b9d;
      --border: rgba(0, 0, 0, 0.08);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 2. HEADER RECUPERADO */
    nav {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* 3. LAYOUT CENTRADO Y BALANCEADO */
    main {
      max-width: 860px;
      width: 100%;
      margin: auto; /* Centrado vertical y horizontal */
      padding: 40px 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 56px;
    }

    .hero-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .hero-sub {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* 4. GRID DE TARJETAS */
    .sections-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
    }

    .section-card:hover {
      border-color: var(--accent);
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08);
    }

    /* 5. ELEMENTOS INTERNOS DE LA CARD */
    .icon-box {
      width: 48px;
      height: 48px;
      background: #eff6ff;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .section-desc {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .card-footer {
      margin-top: auto;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .sections-grid { grid-template-columns: 1fr; }
      main { padding: 40px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-logo">PMO Dashboard</span>
  </nav>

  <main>
    <header class="hero">
      <h1 class="hero-title">Dashboard PMO</h1>
    </header>

    <div class="sections-grid">
      <!-- Tarjeta 1 -->
      <a href="crs/index.html" class="section-card">
        <div class="icon-box">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"></path><path d="M8 21H3v-5"></path><path d="M21 3 3 21"></path></svg>
        </div>
        <h2 class="section-title">Change Requests</h2>
        <p class="section-desc">Control de desviaciones y estimaciones por rol.</p>
        <div class="card-footer">Ver reportes <span>→</span></div>
      </a>     

      <!-- Tarjeta 2 -->
      <a href="reportes/mensual/index.html" class="section-card">
        <div class="icon-box">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        </div>
        <h2 class="section-title">Métricas Mensuales</h2>
        <p class="section-desc">Análisis de esfuerzo mensual y métricas de Service Desk.</p>
        <div class="card-footer">Ver reportes <span>→</span></div>
      </a>
     
    </div>
  </main>

</body>
</html>
