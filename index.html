<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard PMO</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --accent: #2563eb; /* Azul corporativo para detalles */

      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.15);

      --text-primary: #1a1a18;
      --text-secondary: #51514e;
      --text-tertiary: #8a8980;

      --shadow:
        0 1px 3px rgba(0,0,0,0.05),
        0 10px 20px rgba(0,0,0,0.03);

      --radius: 16px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-primary);
    }

    /* LAYOUT */
    main {
      max-width: 900px; /* Un poco más estrecho para centralizar el foco */
      width: 100%;
      margin: auto; /* Centra verticalmente en el viewport si hay poco contenido */
      padding: 60px 24px;
    }

    /* HERO */
    .hero {
      text-align: center; /* Centrado para compensar la poca cantidad de cards */
      margin-bottom: 48px;
    }

    .hero-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .hero-sub {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* GRID */
    .sections-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 columnas fijas para este caso */
      gap: 24px;
    }

    /* SECTION CARD */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    /* Icono decorativo */
    .section-card::before {
      content: '→';
      position: absolute;
      right: 24px;
      bottom: 24px;
      font-size: 20px;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.2s ease;
    }

    .section-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.08);
    }

    .section-card:hover::before {
      opacity: 1;
      transform: translateX(0);
    }

    .card-icon {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .section-desc {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .sections-grid {
        grid-template-columns: 1fr;
      }
      main {
        margin: 0 auto;
        padding: 40px 20px;
      }
      .hero-title {
        font-size: 30px;
      }
    }

  </style>
</head>

<body>

  <nav>
    <span class="nav-logo">
      DASHBOARD PMO
    </span>
  </nav>

  <main>

    <section class="hero">
      <h1 class="hero-title">Gestión de Proyectos</h1>
      <p class="hero-sub">Seleccione un área para visualizar los indicadores de desempeño.</p>
    </section>

    <section class="sections-grid">

      <a class="section-card" href="reportes/mensual/index.html">
        <div class="card-icon">📊</div>
        <div class="section-title">Métricas Mensuales</div>
        <div class="section-desc">
          Seguimiento de esfuerzo, performance y métricas clave de Service Desk.
        </div>
      </a>

      <a class="section-card" href="crs/index.html">
        <div class="card-icon">⚙️</div>
        <div class="section-title">Change Requests</div>
        <div class="section-desc">
          Análisis de desvíos, breakdown por rol y comparativa de ejecución real.
        </div>
      </a>

    </section>
  </main>

</body>

</html>
