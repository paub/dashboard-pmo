<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CR Analytics</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Sincronizado con la Home */
      --bg: #f9fafb; 
      --surface: #ffffff;
      --accent: #2563eb;
      
      --border: rgba(0, 0, 0, 0.06);
      --border-strong: rgba(0, 0, 0, 0.12);

      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-tertiary: #9ca3af;

      /* Semántica refinada */
      --red-bg: #fef2f2;
      --red-text: #b91c1c;
      --red-border: #f87171;

      --green-bg: #f0fdf4;
      --green-text: #15803d;
      --green-border: #4ade80;

      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --radius: 16px; /* Aumentado para coincidir con la Home */

      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'SF Mono', 'Monaco', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* NAV (Idéntico a Home) */
    nav {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .nav-sep {
      width: 1px;
      height: 14px;
      background: var(--border-strong);
    }

    .nav-section {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* LAYOUT */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    /* BREADCRUMB */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .breadcrumb a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb-sep { color: var(--text-tertiary); }
    .breadcrumb-current { color: var(--text-primary); font-weight: 600; }

    /* PAGE HEADER */
    .page-header { margin-bottom: 32px; }
    .page-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    /* GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* CARD REFINADA */
    .cr-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--red-border); /* Un poco más gruesa para carácter */
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .cr-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
      border-color: var(--border-strong);
      border-left-color: var(--red-text);
    }

    .cr-card.under { border-left-color: var(--green-border); }
    .cr-card.under:hover { border-left-color: var(--green-text); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .card-id {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-tertiary);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .card-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px; /* Menos redondo para look profesional */
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .badge-over { background: var(--red-bg); color: var(--red-text); }
    .badge-under { background: var(--green-bg); color: var(--green-text); }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 20px;
      color: var(--text-primary);
      min-height: 42px; /* Estabiliza el grid */
    }

    .card-sep {
      height: 1px;
      background: var(--border);
      margin-bottom: 16px;
    }

    .card-metrics {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .metric { display: flex; flex-direction: column; }
    .metric-val { font-size: 16px; font-weight: 700; }
    .metric-val.over { color: var(--red-text); }
    .metric-lbl { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }

    .metric-divider { width: 1px; height: 24px; background: var(--border); }

    .delta-chip {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--mono);
    }

    .delta-over { background: var(--red-bg); color: var(--red-text); }
    .delta-under { background: var(--green-bg); color: var(--green-text); }

    /* EMPTY CARD */
    .card-empty {
      min-height: 160px;
      border: 2px dashed var(--border-strong);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      font-size: 13px;
      font-weight: 500;
      background: rgba(0,0,0,0.01);
    }

    @media (max-width: 640px) {
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <nav>
    <span class="nav-logo">PMO Dashboard</span>
    <div class="nav-sep"></div>
    <span class="nav-section">Change Requests</span>
  </nav>

  <main>
    <div class="breadcrumb">
      <a href="../index.html">Inicio</a>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current">Change Requests</span>
    </div>

    <div class="page-header">
      <h1 class="page-title">Change Requests</h1>
    </div>

    <div class="cards-grid">
      <!-- Card 1 -->
      <a class="cr-card" href="xtpsd-2308.html">
        <div class="card-header">
          <span class="card-id">XTPSD-2308</span>
          <span class="card-badge badge-over">↑ Excedido</span>
        </div>
        <div class="card-title">WB — Configuración B2C por empresa + Subdominio B2C Travelclub</div>
        <div class="card-sep"></div>
        <div class="card-metrics">
          <div class="metric">
            <span class="metric-val over">83.5 hs</span>
            <span class="metric-lbl">Real</span>
          </div>
          <div class="metric-divider"></div>
          <div class="metric">
            <span class="metric-val">72.9 hs</span>
            <span class="metric-lbl">Estimado</span>
          </div>
          <div class="metric-divider"></div>
          <span class="delta-chip delta-over">+10.6h</span>
        </div>
      </a>

      <div class="card-empty">Próximo CR</div>
      <div class="card-empty">Próximo CR</div>
    </div>
  </main>
</body>
</html>
